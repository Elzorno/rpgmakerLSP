site_name: The Last Sword Protocol — Atlas
site_description: Engine-independent creative authority for The Last Sword Protocol
site_author: Last Sword Protocol Studio
repo_url: https://github.com/Elzorno/rpgmakerLSP
repo_name: Elzorno/rpgmakerLSP

docs_dir: atlas/docs
site_dir: atlas/site

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
  palette:
    - scheme: slate
      primary: amber
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    - scheme: default
      primary: amber
      accent: cyan
      toggle:
        icon: material/weather-night
        name: Switch to dark mode

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search

nav:
  - Atlas Home: index.md
  - 00 Foundation:
      - Overview: 00_Foundation/index.md
      - Project Constitution: 00_Foundation/Project_Constitution.md
      - Studio Manifesto: 00_Foundation/Studio_Manifesto.md
      - Player Promise: 00_Foundation/Player_Promise.md
      - Atlas Operating System: 00_Foundation/Atlas_Operating_System.md
      - Atlas Roadmap: 00_Foundation/Atlas_Roadmap.md
      - Atlas ID Specification: 00_Foundation/Atlas_ID_Specification.md
      - Metadata Schema: 00_Foundation/Metadata_Schema.md
      - Page Template: 00_Foundation/Page_Template.md
  - 01 Creative:
      - Overview: 01_Creative/index.md
      - Creative Bible: 01_Creative/Creative_Bible.md
  - 02 World:
      - Overview: 02_World/index.md
      - World and Location Bible: 02_World/World_and_Location_Bible.md
  - 03 Story:
      - Overview: 03_Story/index.md
  - 04 Gameplay:
      - Overview: 04_Gameplay/index.md
  - 05 Characters:
      - Overview: 05_Characters/index.md
  - 06 Monsters:
      - Overview: 06_Monsters/index.md
  - 07 Art:
      - Overview: 07_Art/index.md
  - 08 Audio:
      - Overview: 08_Audio/index.md
  - 09 Technical:
      - Overview: 09_Technical/index.md
      - Development Standards: 09_Technical/Development_Standards.md
  - 10 AI:
      - Overview: 10_AI/index.md
  - 99 Reference:
      - Overview: 99_Reference/index.md
      - Decision Records: 99_Reference/Decision_Records/index.md
      - DDR-0001 Atlas Is Primary: 99_Reference/Decision_Records/DDR-0001_Atlas_Is_Primary.md
      - DDR-0002 No Supernatural Magic: 99_Reference/Decision_Records/DDR-0002_No_Supernatural_Magic.md
